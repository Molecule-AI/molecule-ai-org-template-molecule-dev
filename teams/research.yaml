name: Research Lead
role: Market analysis and technical research
files_dir: research-lead
canvas: {x: 200, y: 250}
        # Research roles add browser-automation for live web scraping
        # (product pages, GitHub trending, docs).
plugins: [browser-automation]
        # #383: notify on high-value async output (eco-watch summaries,
        # competitive intelligence findings) via Telegram so they're not
        # invisible until the user manually checks memory/canvas.
channels:
  - type: telegram
    config:
      bot_token: ${TELEGRAM_BOT_TOKEN}
      chat_id: ${TELEGRAM_CHAT_ID}
    enabled: true
schedules:
  - name: Orchestrator pulse
    cron_expr: "4,9,14,19,24,29,34,39,44,49,54,59 * * * *"
    enabled: true
    prompt_file: schedules/orchestrator-pulse.md
  - name: Hourly ecosystem watch
    cron_expr: "8,38 * * * *"
    enabled: true
    prompt_file: schedules/hourly-ecosystem-watch.md
            # #27: explicit hourly ecosystem-watch with full inline prompt —
            # ensures the schedule fires with a complete prompt even if the
            # prompt_file above is missing or contains only a stub.
            # Cron offset :00 is intentionally different from the prompt_file
            # variant (:08/:38) to avoid double-firing while both coexist.
  - name: Ecosystem watch (hourly, inline)
    cron_expr: "0 * * * *"
    enabled: true
    prompt: "Run ecosystem-watch: scan HN, arXiv, GitHub trending, product launches in the AI/developer-tools space. Summarize new signals relevant to Molecule AI's roadmap. Commit findings to memory and surface anything urgent to PM."
children:
  - !include ../market-analyst/workspace.yaml
  - !include ../technical-researcher/workspace.yaml
  - !include ../competitive-intelligence/workspace.yaml
initial_prompt_file: initial-prompt.md
